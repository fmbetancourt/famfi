# SonarCloud project identification
sonar.projectKey=fmbetancourt_famfi
sonar.organization=fmbetancourt

# SonarCloud server
sonar.host.url=https://sonarcloud.io

# Source configuration
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx
sonar.typescript.tsconfigPath=tsconfig.json

# Exclusions
sonar.exclusions=\
  **/node_modules/**,\
  **/.next/**,\
  **/coverage/**,\
  **/dist/**,\
  **/prisma/migrations/**,\
  **/*.config.ts,\
  **/*.config.js

# Coverage report (generated by: pnpm test --coverage)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Coverage exclusions — mirrors vitest.config.ts coverage.exclude so that
# files without test coverage are not counted as uncovered by SonarCloud.
# React components (.tsx) have no unit tests by project convention (node env).
sonar.coverage.exclusions=\
  **/*.tsx,\
  src/app/**,\
  src/generated/**,\
  src/types/**,\
  src/lib/auth.ts,\
  src/lib/prisma.ts,\
  src/infrastructure/trpc/client.ts,\
  src/infrastructure/trpc/server.ts,\
  src/infrastructure/trpc/routers/index.ts,\
  src/components/layout/nav-items.ts,\
  **/*.config.ts,\
  **/*.config.js
