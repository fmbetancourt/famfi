# SonarCloud project identification
sonar.projectKey=fmbetancourt_famfi
sonar.organization=fmbetancourt

# SonarCloud server
sonar.host.url=https://sonarcloud.io

# Source configuration
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx
sonar.typescript.tsconfigPath=tsconfig.json

# Exclusions
sonar.exclusions=\
  **/node_modules/**,\
  **/.next/**,\
  **/coverage/**,\
  **/dist/**,\
  **/prisma/migrations/**,\
  **/*.config.ts,\
  **/*.config.js

# Coverage report (generated by: pnpm test --coverage)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
